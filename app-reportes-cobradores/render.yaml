services:
  - type: web
    name: reportes-cobradores
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reportes-cobradores-db
          property: connectionString

databases:
  - name: reportes-cobradores-db
    plan: free
